# This is a Databricks asset bundle definition for Retail.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Retail
  uuid: 5dbf8558-73da-477a-8518-c88a06ba925e

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9387eb0e-2fe4.cloud.databricks.com/
    variables:
      catalog: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-9387eb0e-2fe4.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/ritheshadep@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ritheshadep@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod
    permissions:
      - user_name: ritheshadep@gmail.com
        level: CAN_MANAGE
